# Layer 1: Fast checks on staged files (<5s)
# Runs on every save/pre-commit
# Only checks changed files for speed

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # Format with ruff (fast)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff-format
        args: [--line-length=88]
        types_or: [python]
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python]

  # Type check only staged Python files (fast)
  - repo: local
    hooks:
      - id: type-check-staged
        name: Type check (staged files)
        entry: bash -c 'if [ -n "$(git diff --cached --name-only --diff-filter=ACM | grep "\.py$")" ]; then ./dev/type $(git diff --cached --name-only --diff-filter=ACM | grep "\.py$"); fi'
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]
